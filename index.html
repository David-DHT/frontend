<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNICAFE - Menú</title>
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/index.css" />
</head>

<body>
  <div id="header-dinamico"></div>

  <div class="header-categorias">
    <nav class="menu-list" id="sidebarMenu">
      <p style="padding:10px">Cargando categorías...</p>
    </nav>
  </div>

  <section class="hero-carousel-section">
    <div class="hero-carousel" id="heroCarousel">
      <button class="hero-btn prev" id="heroPrev" aria-label="Anterior">❮</button>

      <div class="hero-slides" id="heroSlides">
        <p style="padding:20px;">Cargando productos destacados...</p>
      </div>

      <button class="hero-btn next" id="heroNext" aria-label="Siguiente">❯</button>
    </div>
  </section>

  <div class="layout">
    <div class="main-content">
      <div class="menu-sections" id="contenedorProductos">
        <p>Cargando el menú...</p>
      </div>
    </div>
  </div>

  <div id="footer-dinamico"></div>

  <script src="../js/footer.js"></script>
  <script src="js/index.js"></script>
  <script src="js/headers.js"></script>
</body>

</html>
