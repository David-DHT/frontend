<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Usuarios - UNICAFE</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <link rel="stylesheet" href="../css/gestionUsuarios.css" />
</head>

<body>
  <div id="header-dinamico"></div>

  <main class="inventory-content">
    <div class="back-container">
      <a href="principalAdmin.html" class="btn-regresar-unicafe">
        <i class="bi bi-arrow-left"></i> Regresar
      </a>
    </div>

    <div class="header-text">
      <h2>Gestión de Usuarios</h2>
      <p>Administración de usuarios registrados y sus actividades.</p>
    </div>

    <div class="toolbar-container">
      <div class="search-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input"
          placeholder="Buscar por nombre, correo, teléfono o perfil..." />
      </div>
    </div>

    <section class="inventory-table-container">
      <table class="styled-table">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Correo Electrónico</th>
            <th>Teléfono</th>
            <th>Perfil</th>
            <th>Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaResultados">
          <tr>
            <td colspan="6" class="text-center p-4">Cargando usuarios...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <!-- Modal Editar Usuario -->
  <div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-labelledby="modalEditarUsuarioLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <form id="formEditarUsuario">
          <div class="modal-header">
            <h5 class="modal-title" id="modalEditarUsuarioLabel">
              Editar usuario
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editIdUsuario" />

            <div id="mensajeModalUsuario" class="mb-3"></div>

            <div class="row g-3">
              <div class="col-md-6">
                <label for="editNombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="editNombre" required />
              </div>

              <div class="col-md-6">
                <label for="editAPaterno" class="form-label">Apellido paterno</label>
                <input type="text" class="form-control" id="editAPaterno" required />
              </div>

              <div class="col-md-6">
                <label for="editAMaterno" class="form-label">Apellido materno</label>
                <input type="text" class="form-control" id="editAMaterno" required />
              </div>

              <div class="col-md-6">
                <label for="editPerfil" class="form-label">Perfil</label>
                <select class="form-select" id="editPerfil" required>
                  <option value="">Selecciona un perfil</option>
                  <option value="1">Alumno</option>
                  <option value="2">Docente</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="editCorreo" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="editCorreo" readonly />
              </div>

              <div class="col-md-6">
                <label for="editTelefono" class="form-label">Teléfono</label>
                <input type="text" class="form-control" id="editTelefono" readonly />
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>
            <button type="submit" class="btn btn-guardar">
              Guardar cambios
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="footer-dinamico"></div>

  <script src="../js/footer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/gestionUsuarios.js" defer></script>
  <script src="../js/headers.js"></script>
</body>

</html>
