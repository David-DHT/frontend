<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <link rel="stylesheet" href="../css/gestionVentas.css" />
</head>

<body>
    <div id="header-dinamico"></div>
    <main class="inventory-content">
        <div class="back-container">
            <a href="principalAdmin.html" class="btn-regresar-unicafe">
                <i class="bi bi-arrow-left"></i> Regresar
            </a>
        </div>

        <div class="header-text">
            <h2>Historial de ventas</h2>
            <p>Consulta, edita y cancela pedidos registrados en el sistema.</p>
        </div>

        <div class="toolbar-container">
            <div class="toolbar-left">
                <div class="search-wrapper">
                    <i class="bi bi-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input"
                        placeholder="Buscar por ID, trabajador, método o estado..." />
                </div>

                <select id="filtroEstado" class="search-input filtro-select">
                    <option value="">Todos los estados</option>
                    <option value="activa">Activa</option>
                    <option value="cancelada">Cancelada</option>
                </select>
            </div>
        </div>

        <section class="inventory-table-container">
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>ID Venta</th>
                        <th>Fecha</th>
                        <th>Trabajador</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Método de pago</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaResultados">
                    <tr>
                        <td colspan="7" class="text-center p-4">Cargando ventas...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <!-- MODAL EDITAR / CANCELAR -->
    <div class="modal fade" id="modalEditarVenta" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <form id="formEditarVenta">
                    <div class="modal-header">
                        <h5 class="modal-title">Detalle de venta</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>

                    <div class="modal-body">
                        <div id="mensajeModalVenta"></div>

                        <input type="hidden" id="editVentaId" />

                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label for="editIdVenta" class="form-label">ID Venta</label>
                                <input type="text" id="editIdVenta" class="form-control" readonly />
                            </div>

                            <div class="col-md-4">
                                <label for="editFechaVenta" class="form-label">Fecha</label>
                                <input type="text" id="editFechaVenta" class="form-control" readonly />
                            </div>

                            <div class="col-md-4">
                                <label for="editTotalVenta" class="form-label">Total</label>
                                <input type="text" id="editTotalVenta" class="form-control" readonly />
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="editTrabajadorVenta" class="form-label">
                                    Trabajador
                                </label>
                                <input type="text" id="editTrabajadorVenta" class="form-control" readonly />
                            </div>

                            <div class="col-md-3">
                                <label for="editEstadoVenta" class="form-label">Estado</label>
                                <input type="text" id="editEstadoVenta" class="form-control" readonly />
                            </div>

                            <div class="col-md-3">
                                <label for="editMetodoPagoVenta" class="form-label">
                                    Método de pago
                                </label>
                                <select id="editMetodoPagoVenta" class="form-select" required>
                                    <option value="">Cargando métodos...</option>
                                </select>
                            </div>
                        </div>

                        <div class="detalle-box">
                            <h6 class="mb-3">Detalle del pedido</h6>
                            <div class="table-responsive">
                                <table class="table table-bordered align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Producto</th>
                                            <th>Cantidad</th>
                                            <th>Precio unitario</th>
                                            <th>Subtotal</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tablaDetalleVenta">
                                        <tr>
                                            <td colspan="4" class="text-center p-3">
                                                Sin detalle disponible.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="mt-3">
                            <label for="motivoCancelacion" class="form-label">
                                Motivo de cancelación
                            </label>
                            <textarea id="motivoCancelacion" class="form-control" rows="2"
                                placeholder="Solo se usa si vas a cancelar la venta"></textarea>
                        </div>

                        <div class="mt-3">
                            <label for="editMotivoCancelacionGuardado" class="form-label">
                                Motivo registrado
                            </label>
                            <textarea id="editMotivoCancelacionGuardado" class="form-control" rows="2"
                                readonly></textarea>
                        </div>
                    </div>

                    <div class="modal-footer d-flex justify-content-between">
                        <button type="button" class="btn btn-danger" id="btnCancelarVenta">
                            <i class="bi bi-x-circle"></i> Cancelar venta
                        </button>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                Cerrar
                            </button>
                            <button type="submit" class="btn btn-primary" id="btnGuardarCambiosVenta">
                                <i class="bi bi-check-circle"></i> Guardar cambios
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Footer -->
    <div id="footer-dinamico"></div>
    <script src="../js/footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/gestionVentas.js" defer></script>
    <script src="../js/headers.js"></script>
</body>

</html>
