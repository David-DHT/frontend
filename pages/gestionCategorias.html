<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Categorías</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/gestionCategorias.css" />
  </head>

  <body>
    <div id="header-dinamico"></div>

    <main class="inventory-content">
      <div class="back-container">
        <a href="principalAdmin.html" class="btn-regresar-unicafe">
          <i class="bi bi-arrow-left"></i> Regresar
        </a>
      </div>

      <div class="header-text">
        <h2>Gestión de Categorías</h2>
        <p>Administra las clasificaciones de tus productos.</p>
      </div>

      <div class="toolbar-container">
        <div class="search-wrapper">
          <i class="bi bi-search search-icon"></i>
          <input
            type="text"
            id="inputBuscarCategoria"
            class="search-input"
            placeholder="Buscar categoría..."
          />
        </div>

        <button type="button" class="btn-add-provider" id="btnNuevaCategoria">
          <i class="bi bi-plus-lg"></i> Agregar
        </button>
      </div>

      <section class="inventory-table-container">
        <table class="styled-table">
          <thead>
            <tr>
              <th style="width: 70px">#</th>
              <th>Nombre de categoría</th>
              <th>Descripción</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaCategorias">
            <tr>
              <td colspan="4" class="text-center p-4">
                Cargando categorías...
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
    <!-- MODAL AGREGAR / EDITAR -->
    <div
      class="modal fade"
      id="modalCategoria"
      tabindex="-1"
      aria-labelledby="tituloModalCategoria"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form id="formCategoria">
            <div class="modal-header">
              <h5 class="modal-title" id="tituloModalCategoria">
                Agregar categoría
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Cerrar"
              ></button>
            </div>

            <div class="modal-body">
              <div id="mensajeCategoria"></div>

              <input type="hidden" id="categoriaId" />

              <div class="mb-3">
                <label for="nombreCategoria" class="form-label">
                  Nombre de la categoría
                </label>
                <input
                  type="text"
                  class="form-control"
                  id="nombreCategoria"
                  placeholder="Ingresa el nombre de la categoría"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="descripcionCategoria" class="form-label">
                  Descripción
                </label>
                <textarea
                  class="form-control"
                  id="descripcionCategoria"
                  rows="3"
                  placeholder="Ingresa una descripción"
                ></textarea>
              </div>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <button type="submit" class="btn btn-success" id="btnGuardarCategoria">
                <i class="bi bi-check-circle"></i> Guardar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
      <!-- Footer -->
      <div id="footer-dinamico"></div>
      <script src="../js/footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/gestionCategorias.js"></script>
    <script src="../js/headers.js"></script>
  </body>
</html>
