<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Categorías</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/gestionCategorias.css" />
  </head>

  <body>
    <header class="p-3 bg-dark text-white text-center">
      <h4>Prueba de Gestión de Categorías</h4>
    </header>

    <main class="inventory-content">
      <div class="back-container">
        <a href="principalAdmin.html" class="btn-regresar-unicafe">
          <i class="bi bi-arrow-left"></i> Regresar
        </a>
      </div>

      <div class="header-text">
        <h2>Gestión de Categorías</h2>
        <p>Administra las clasificaciones de tus productos.</p>
      </div>

      <div class="toolbar-container">
        <div class="search-wrapper">
          <i class="bi bi-search search-icon"></i>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Buscar categoría..."
          />
        </div>

        <a href="agregarCategoria.html" class="btn-add-provider">
          <i class="bi bi-plus-lg"></i> Agregar
        </a>
      </div>

      <section class="inventory-table-container">
        <table class="styled-table">
          <thead>
            <tr>
              <th>Nombre de categoría</th>
              <th>Descripción</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaResultados">
            <tr>
              <td colspan="3" class="text-center p-4">
                Cargando categorías...
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer class="p-3 bg-light text-center mt-auto">DESARROLLOOO</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/gestionCategorias.js" defer></script>
  </body>
</html>
