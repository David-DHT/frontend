<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNICAFE - Registrar Administrador</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/header.css" />
  <link rel="stylesheet" href="../css/footer.css" />
  <link rel="stylesheet" href="../css/agregarAdmin.css" />
</head>

<body>
  <div id="header-dinamico"></div>

  <main>
    <div class="register-wrapper">
      <div class="back-container">
        <a href="principalAdmin.html" class="btn-regresar-unicafe">
          <i class="bi bi-arrow-left"></i> Regresar
        </a>
      </div>

      <div class="register-card">
        <div class="form-header">
          <h2>Crear cuenta nueva para un Administrador</h2>
          <p class="form-subtitle">
            Registra un nuevo usuario con privilegios de administrador.
          </p>
        </div>

        <div id="mensajeAlerta" class="mensaje-alerta" style="display: none;"></div>

        <form id="registroAdminForm" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="nombre">Nombre(s)</label>
              <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan" required maxlength="50"
                pattern="[a-zA-Zﾃ｡ﾃｩﾃｭﾃｳﾃｺﾃ⊋嘉催禿堙ｱﾃ曾¥s]+" title="Solo letras y espacios" />
            </div>

            <div class="form-group">
              <label for="a_paterno">Apellido paterno</label>
              <input type="text" id="a_paterno" name="a_paterno" placeholder="Ej. Pﾃｩrez" required maxlength="50"
                pattern="[a-zA-Zﾃ｡ﾃｩﾃｭﾃｳﾃｺﾃ⊋嘉催禿堙ｱﾃ曾¥s]+" title="Solo letras y espacios" />
            </div>

            <div class="form-group">
              <label for="a_materno">Apellido materno</label>
              <input type="text" id="a_materno" name="a_materno" placeholder="Ej. Lﾃｳpez" required maxlength="50"
                pattern="[a-zA-Zﾃ｡ﾃｩﾃｭﾃｳﾃｺﾃ⊋嘉催禿堙ｱﾃ曾¥s]+" title="Solo letras y espacios" />
            </div>

            <div class="form-group">
              <label for="telefono">Telﾃｩfono</label>
              <input type="tel" id="telefono" name="telefono" placeholder="10 dﾃｭgitos" required maxlength="10"
                pattern="[0-9]{10}" title="Debe contener 10 dﾃｭgitos numﾃｩricos" />
            </div>

            <div class="form-group full-width">
              <label for="email">Correo electrﾃｳnico</label>
              <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required maxlength="100"
                autocomplete="off" />
            </div>

            <div class="form-group full-width">
              <label for="password">Contraseﾃｱa</label>
              <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="窶｢窶｢窶｢窶｢窶｢窶｢窶｢窶｢" required maxlength="20"
                  minlength="8" pattern="(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}" autocomplete="new-password"
                  title="Mﾃｭnimo 8 caracteres, al menos 1 mayﾃｺscula y 1 carﾃ｡cter especial" />
                <i class="bi bi-eye-slash-fill" id="togglePassword"></i>
              </div>
              <small class="password-help">
                Requisitos: mﾃｭnimo 8 caracteres, 1 mayﾃｺscula y 1 carﾃ｡cter especial.
              </small>
            </div>

            <div class="form-group full-width">
              <label for="estado">Estado del usuario</label>
              <select id="estado" name="estado" required>
                <option value="">Selecciona un estado</option>
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>

            <input type="hidden" id="idPerfil" name="idPerfil" value="3" />

            <div class="button-group full-width">
              <button type="button" class="btn btn-limpiar" id="btnLimpiar">
                Limpiar campos
              </button>
              <button type="submit" class="btn btn-guardar">
                Registrar administrador
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </main>

  <div id="footer-dinamico"></div>

  <script src="../js/footer.js"></script>
  <script src="../js/headers.js"></script>
  <script src="../js/agregarAdmin.js"></script>
</body>

</html>
