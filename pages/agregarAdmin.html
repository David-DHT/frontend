<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNICAFE - Registrar Admin</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/agregarAdmin.css" />
  </head>
  <body>
    <div id="header-dinamico"></div>
    <main>
      <div class="register-card">
        <div class="form-header">
          <h2>Crear cuenta nueva para un Administrador</h2>
        </div>

        <form id="registroForm" method="POST" action="guardarAdmin.php">
          <div class="form-grid">
            <div class="form-group">
              <label for="nombre">Nombre(s)</label>
              <input
                type="text"
                id="nombre"
                name="nombre"
                placeholder="Ej. Juan"
                required
                maxlength="50"
                pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+"
                title="Solo letras y espacios"
                oninput="
                  this.setCustomValidity('');
                  soloLetras(event);
                "
                oninvalid="
                  this.setCustomValidity(
                    'El nombre es obligatorio y solo acepta letras.',
                  )
                "
              />
            </div>

            <div class="form-group">
              <label for="a_paterno">Apellido Paterno</label>
              <input
                type="text"
                id="a_paterno"
                name="a_paterno"
                placeholder="Ej. Pérez"
                required
                maxlength="50"
                pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+"
                title="Solo letras"
                oninput="
                  this.setCustomValidity('');
                  soloLetras(event);
                "
                oninvalid="
                  this.setCustomValidity('El apellido paterno es obligatorio.')
                "
              />
            </div>

            <div class="form-group">
              <label for="a_materno">Apellido Materno</label>
              <input
                type="text"
                id="a_materno"
                name="a_materno"
                placeholder="Ej. López"
                required
                maxlength="50"
                pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+"
                title="Solo letras"
                oninput="
                  this.setCustomValidity('');
                  soloLetras(event);
                "
                oninvalid="
                  this.setCustomValidity('El apellido materno es obligatorio.')
                "
              />
            </div>

            <div class="form-group">
              <label for="telefono">Teléfono</label>
              <input
                type="tel"
                id="telefono"
                name="telefono"
                placeholder="10 dígitos"
                required
                maxlength="10"
                pattern="[0-9]{10}"
                title="Debe contener 10 dígitos numéricos"
                oninput="
                  this.setCustomValidity('');
                  this.value = this.value.replace(/[^0-9]/g, '');
                "
                oninvalid="
                  this.setCustomValidity(
                    'El teléfono es obligatorio (10 dígitos).',
                  )
                "
              />
            </div>

            <div class="form-group full-width">
              <label for="email">Correo Electrónico</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="ejemplo@correo.com"
                required
                maxlength="100"
                oninput="this.setCustomValidity('')"
                oninvalid="
                  this.setCustomValidity(
                    'El correo es obligatorio y debe ser válido.',
                  )
                "
              />
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  required
                  maxlength="20"
                  pattern="(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}"
                  autocomplete="new-password"
                  title="Mínimo 8 caracteres, al menos 1 mayúscula y 1 carácter especial"
                  oninput="this.setCustomValidity('')"
                  oninvalid="
                    this.setCustomValidity(
                      'La contraseña es obligatoria (Mín 8 caracteres, 1 Mayúscula, 1 Símbolo).',
                    )
                  "
                />
                <i class="bi bi-eye-slash-fill" id="togglePassword"></i>
              </div>
              <small style="font-size: 0.8em; color: #666; margin-top: 5px"
                >Req: 8 caracteres, 1 Mayúscula, 1 Símbolo.</small
              >
            </div>

            <div class="button-group full-width">
              <button
                type="button"
                class="btn btn-limpiar"
                onclick="limpiarFormulario()"
              >
                Limpiar Campos
              </button>
              <button type="submit" class="btn btn-guardar">Registrar</button>
            </div>
          </div>
        </form>
      </div>
    </main>
    <!-- Footer -->
    <div id="footer-dinamico"></div>
    <script src="../js/footer.js"></script>
    
    <script>
      function limpiarFormulario() {
        document.getElementById("registroForm").reset();
      }

      // Función solo letras
      function soloLetras(e) {
        e.target.value = e.target.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñ ]/g, "");
      }

      // Mostrar / Ocultar contraseña
      const togglePassword = document.querySelector("#togglePassword");
      const password = document.querySelector("#password");

      if (togglePassword && password) {
        togglePassword.addEventListener("click", function () {
          const type =
            password.getAttribute("type") === "password" ? "text" : "password";
          password.setAttribute("type", type);
          this.classList.toggle("bi-eye-fill");
          this.classList.toggle("bi-eye-slash-fill");
        });
      }
    </script>
    <script src="../js/headers.js"></script>
  </body>
</html>
