<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNICAFE - Opiniones y Sugerencias</title>
    <link rel="stylesheet" href="../css/opiniones.css" />
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
  </head>
  <body>
    <div id="header-dinamico"></div>
    <main>
      <div class="form-container">
        <h2 class="form-title">opiniones/sugerencias</h2>
        <p class="form-description">
          Nos encantaría conocer tu opinión.<br />
          Déjanos tu sugerencia para mejorar
        </p>

        <form action="../php/inserOpinion.php" method="POST" id="opinionForm" >
          <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required />
          </div>

          <div class="form-group">
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" required></textarea>
          </div>

          <button type="submit" class="submit-btn">Enviar</button>
        </form>
      </div>
    </main>
     
    <div id="footer-dinamico"></div>
    
    <script src="../js/footer.js"></script>
    <script src="../js/headers.js"></script>
  </body>
</html>
