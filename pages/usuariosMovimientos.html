<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movimiento de Usuarios</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/usuariosMovimiento.css" />
  </head>

  <body>
    <header class="p-3 bg-dark text-white text-center">
      <h4>Prueba de Gestión de Usuarios</h4>
    </header>

    <main class="inventory-content">
      <div class="back-container">
        <a href="principalAdmin.html" class="btn-regresar-unicafe">
          <i class="bi bi-arrow-left"></i> Regresar
        </a>
      </div>

      <div class="header-text">
        <h2>Movimiento de Usuarios</h2>
        <p>Edita o elimina los usuarios registrados.</p>
      </div>

      <div class="toolbar-container">
        <div class="search-wrapper">
          <i class="bi bi-search search-icon"></i>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Buscar usuario..."
          />
        </div>
      </div>

      <section class="inventory-table-container">
        <table class="styled-table">
          <thead>
            <tr>
              <th>Nombre completo</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th>Perfil</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaResultados">
            <tr>
              <td colspan="5" class="text-center p-4">
                Cargando usuarios...
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer class="p-3 bg-light text-center mt-auto">DESARROLLOOO</footer>

    <!-- Modal editar usuario -->
    <div
      class="modal fade"
      id="modalEditarUsuario"
      tabindex="-1"
      aria-labelledby="modalEditarUsuarioLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <form id="formEditarUsuario">
            <div class="modal-header">
              <h5 class="modal-title" id="modalEditarUsuarioLabel">
                Editar usuario
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Cerrar"
              ></button>
            </div>

            <div class="modal-body">
              <input type="hidden" id="editIdUsuario" />

              <div class="row g-3">
                <div class="col-md-4">
                  <label for="editNombre" class="form-label">Nombre</label>
                  <input type="text" class="form-control" id="editNombre" required />
                </div>

                <div class="col-md-4">
                  <label for="editAPaterno" class="form-label">Apellido paterno</label>
                  <input type="text" class="form-control" id="editAPaterno" required />
                </div>

                <div class="col-md-4">
                  <label for="editAMaterno" class="form-label">Apellido materno</label>
                  <input type="text" class="form-control" id="editAMaterno" />
                </div>

                <div class="col-md-6">
                  <label for="editCorreo" class="form-label">Correo</label>
                  <input type="email" class="form-control" id="editCorreo" required />
                </div>

                <div class="col-md-6">
                  <label for="editTelefono" class="form-label">Teléfono</label>
                  <input type="text" class="form-control" id="editTelefono" />
                </div>

                <div class="col-md-6">
                  <label for="editPassword" class="form-label">Password</label>
                  <input
                    type="text"
                    class="form-control"
                    id="editPassword"
                    required
                    placeholder="Ingresa la contraseña"
                  />
                </div>

                <div class="col-md-6">
                  <label for="editIdPerfil" class="form-label">ID Perfil</label>
                  <input
                    type="number"
                    class="form-control"
                    id="editIdPerfil"
                    required
                    min="1"
                  />
                </div>
              </div>

              <div id="mensajeModal" class="mt-3"></div>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <button type="submit" class="btn btn-guardar">
                Guardar cambios
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/usuariosMovimiento.js" defer></script>
  </body>
</html>
