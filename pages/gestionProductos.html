<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Productos</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/gestionProductos.css" />
  </head>

  <body>
    <div id="header-dinamico"></div>

    <main class="inventory-content">
      <div class="back-container">
        <a href="principalAdmin.html" class="btn-regresar-unicafe">
          <i class="bi bi-arrow-left"></i> Regresar
        </a>
      </div>

      <div class="header-text">
        <h2>Gestión de Productos</h2>
        <p>Visualiza los productos registrados en el sistema.</p>
      </div>

      <div class="toolbar-container">
        <div class="search-wrapper">
          <i class="bi bi-search search-icon"></i>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Buscar producto..."
          />
        </div>
      </div>

      <section class="inventory-table-container">
        <table class="styled-table">
          <thead>
            <tr>
              <th>Imagen</th>
              <th>Producto</th>
              <th>Descripción</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Estado</th>
              <th>Movimiento</th>
            </tr>
          </thead>
          <tbody id="tablaResultados">
            <tr>
              <td colspan="7" class="text-center p-4">
                Cargando productos...
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <!-- Modal editar producto -->
    <div
      class="modal fade"
      id="modalEditarProducto"
      tabindex="-1"
      aria-labelledby="modalEditarProductoLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <form id="formEditarProducto">
            <div class="modal-header">
              <h5 class="modal-title" id="modalEditarProductoLabel">
                Editar producto
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Cerrar"
              ></button>
            </div>

            <div class="modal-body">
              <input type="hidden" id="editIdProducto" />
              <input type="hidden" id="editImagenActual" />

              <div class="row g-3">
                <div class="col-md-6">
                  <label for="editNombre" class="form-label">Nombre</label>
                  <input type="text" class="form-control" id="editNombre" required />
                </div>

                <div class="col-md-6">
                  <label for="editPrecio" class="form-label">Precio</label>
                  <input type="number" step="0.01" min="0" class="form-control" id="editPrecio" required />
                </div>

                <div class="col-md-6">
                  <label for="editCategoria" class="form-label">Categoría</label>
                  <select class="form-select" id="editCategoria" required>
                    <option value="">Selecciona una categoría</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label for="editEstado" class="form-label">Estado</label>
                  <select class="form-select" id="editEstado" required>
                    <option value="activo">activo</option>
                    <option value="inactivo">inactivo</option>
                  </select>
                </div>

                <div class="col-12">
                  <label for="editDescripcion" class="form-label">Descripción</label>
                  <textarea class="form-control" id="editDescripcion" rows="4" required></textarea>
                </div>

                <div class="col-12">
                  <label for="editImagen" class="form-label">Cambiar imagen</label>
                  <input type="file" class="form-control" id="editImagen" accept="image/*" />
                </div>
              </div>

              <div id="mensajeModalProducto" class="mt-3"></div>
            </div>

            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                Cancelar
              </button>
              <button type="submit" class="btn btn-guardar">
                Guardar cambios
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
 <!-- Footer -->
   <div id="footer-dinamico"></div>

        <script src="../js/footer.js"></script>
    <!-- Bootstrap JS necesario para el modal -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/gestionProductos.js" defer></script>
    <script src="../js/headers.js"></script>
  </body>
</html>
