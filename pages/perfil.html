<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - UNICAFE Admin</title>
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
      <body>
    <div class="back-container">
      <a href="principalAdmin.html" class="btn-regresar-unicafe">
        <i class="fas fa-arrow-left"></i> Regresar
      </a>
    </div>
    
    <div class="profile-container">
        
        <h1 class="page-title">Mi Perfil</h1>

        <div class="summary-card">
            <div class="summary-info">
                <p><strong>Nombre:</strong> Juan Pérez López</p>
                <p><strong>Correo:</strong> admin@unicafe.com</p>
                <p><strong>Teléfono:</strong> 7712345678</p>
                <p><strong>Rol:</strong> Administrador</p>
                <p><strong>Password:</strong> **********</p>
            </div>
        </div>

        <h2 class="section-subtitle">Información Personal</h2>

        <div class="edit-card">
            <form action="#" method="POST">

                <input type="hidden" name="idUsuario" value="1">
                
                <div class="form-row">
                    <label for="nombre">Nombre:</label>
                    <div class="input-wrapper">
                        <input type="text" id="nombre" name="nombre" 
                               value="Juan" 
                               required maxlength="50" 
                               pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" 
                               title="Solo letras y espacios"
                               oninvalid="this.setCustomValidity('El campo nombre es obligatorio')"
                               oninput="this.setCustomValidity(''); this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')"> 
                        <span class="edit-icon" onclick="editarCampo('nombre')">✏️</span>
                    </div>
                </div>

                <div class="form-row">
                    <label for="apellidop">Apellido Paterno:</label>
                    <div class="input-wrapper">
                        <input type="text" id="apellidop" name="aPaterno" 
                               value="Pérez" 
                               required maxlength="50" 
                               pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" 
                               title="Solo letras"
                               oninvalid="this.setCustomValidity('El apellido es obligatorio')"
                               oninput="this.setCustomValidity(''); this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')"> 
                        <span class="edit-icon" onclick="editarCampo('apellidop')">✏️</span>
                    </div>
                </div>

                <div class="form-row">
                    <label for="apellidom">Apellido Materno:</label>
                    <div class="input-wrapper">
                        <input type="text" id="apellidom" name="aMaterno" 
                               value="López" 
                               required maxlength="50" 
                               pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" 
                               title="Solo letras"
                               oninvalid="this.setCustomValidity('El apellido es obligatorio')"
                               oninput="this.setCustomValidity(''); this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')"> 
                        <span class="edit-icon" onclick="editarCampo('apellidom')">✏️</span>
                    </div>
                </div>

                <div class="form-row">
                    <label for="correo">Correo electrónico:</label>
                    <div class="input-wrapper">
                        <input type="email" id="correo" name="email" 
                               value="admin@unicafe.com" 
                               required maxlength="100"
                               oninvalid="this.setCustomValidity('El correo es obligatorio')"
                               oninput="this.setCustomValidity('')">
                        <span class="edit-icon" onclick="editarCampo('correo')">✏️</span>
                    </div>
                </div>

                <div class="form-row">
                    <label for="telefono">Teléfono:</label>
                    <div class="input-wrapper">
                        <input type="tel" id="telefono" name="telefono" 
                               value="7712345678" 
                               required maxlength="10" 
                               pattern="[0-9]{10}" 
                               title="10 dígitos numéricos"
                               oninvalid="this.setCustomValidity('El telefono es obligatorio')"
                               oninput="this.setCustomValidity(''); this.value = this.value.replace(/[^0-9]/g, '')">
                        <span class="edit-icon" onclick="editarCampo('telefono')">✏️</span>
                    </div>
                </div>

                <div class="form-row">
                    <label>Rol del Usuario:</label>
                    <div class="input-wrapper">
                        <input type="text" value="Administrador" readonly class="input-readonly" style="background-color: #e9ecef; cursor: not-allowed;">
                        <i class="fas fa-lock icon-locked" style="color: #6c757d;"></i>
                    </div>
                </div>

                <div class="form-row" style="border-bottom: none;">
                    <label for="password">Contraseña (Opcional):</label>
                    <div class="input-wrapper" style="position: relative;">
                        <input type="password" id="password" name="password" 
                               pattern="(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}" 
                               title="Mínimo 8 caracteres, al menos 1 mayúscula y 1 carácter especial."
                               placeholder="Deja vacío para no cambiar"
                               maxlength="20"
                               style="padding-right: 40px;">
                        <i class="fas fa-eye-slash" 
                           id="togglePassword" 
                           style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #555;"></i>
                    </div>
                </div>
                
                <div class="btn-container">
                    <button type="submit" class="btn-guardar">Guardar Cambios</button>
                </div>
                
            </form>
        </div>

    </div>
    
    <script>
        // 1. Función para el lápiz (poner foco y mover cursor al final)
        function editarCampo(idInput) {
            var input = document.getElementById(idInput);
            if(input) {
                input.focus();
                var valor = input.value;
                input.value = '';
                input.value = valor;
            }
        }

        // 2. Función para el ojito (Ver/Ocultar contraseña)
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        if(togglePassword && password) {
            togglePassword.addEventListener('click', function (e) {
                // Alternar tipo input
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                
                // Alternar clase del icono (fa-eye / fa-eye-slash)
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }
    </script>

</body>
</html>
