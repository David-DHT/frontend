<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - UNICAFE Admin</title>
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="header-dinamico"></div>
    <div class="back-container">
      <a href="principalAdmin.html" class="btn-regresar-unicafe">
        <i class="fas fa-arrow-left"></i> Regresar
      </a>
    </div>
    
    <div class="profile-container">
        
        <h1 class="page-title">Mi Perfil</h1>

        <div class="summary-card">
            <div class="summary-info">
                <p><strong>Nombre:</strong> <span id="resumen-nombre">Cargando...</span></p>
                <p><strong>Correo:</strong> <span id="resumen-correo">Cargando...</span></p>
                <p><strong>Tel茅fono:</strong> <span id="resumen-telefono">Cargando...</span></p>
                <p><strong>Rol:</strong> <span id="resumen-rol">Cargando...</span></p>
            </div>
        </div>

        <h2 class="section-subtitle">Informaci贸n Personal</h2>

        <div class="edit-card">
            <form action="#" method="POST" id="formPerfil">

                <input type="hidden" id="inputIdUsuario" name="idUsuario" value="">
                
                <div class="form-row">
                    <label for="nombre">Nombre:</label>
                    <div class="input-wrapper">
                        <input type="text" id="nombre" name="nombre" 
                               value="" 
                               required maxlength="50" 
                               pattern="[a-zA-Z谩茅铆贸煤脕脡脥脫脷帽脩\s]+" 
                               title="Solo letras y espacios"
                               oninvalid="this.setCustomValidity('El campo nombre es obligatorio')"
                               oninput="this.setCustomValidity(''); this.value = this.value.replace(/[^a-zA-Z谩茅铆贸煤脕脡脥脫脷帽脩\s]/g, '')"> 
                        <span class="edit-icon" onclick="editarCampo('nombre')">鉁忥笍</span>
                    </div>
                </div>

                <div class="form-row">
                    <label for="apellidop">Apellido Paterno:</label>
                    <div class="input-wrapper">
                        <input type="text" id="apellidop" name="aPaterno" 
                               value="" 
                               required maxlength="50" 
                               pattern="[a-zA-Z谩茅铆贸煤脕脡脥脫脷帽脩\s]+" 
                               title="Solo letras"
                               oninvalid="this.setCustomValidity('El apellido es obligatorio')"
                               oninput="this.setCustomValidity(''); this.value = this.value.replace(/[^a-zA-Z谩茅铆贸煤脕脡脥脫脷帽脩\s]/g, '')"> 
                        <span class="edit-icon" onclick="editarCampo('apellidop')">鉁忥笍</span>
                    </div>
                </div>

                <div class="form-row">
                    <label for="apellidom">Apellido Materno:</label>
                    <div class="input-wrapper">
                        <input type="text" id="apellidom" name="aMaterno" 
                               value="" 
                               required maxlength="50" 
                               pattern="[a-zA-Z谩茅铆贸煤脕脡脥脫脷帽脩\s]+" 
                               title="Solo letras"
                               oninvalid="this.setCustomValidity('El apellido es obligatorio')"
                               oninput="this.setCustomValidity(''); this.value = this.value.replace(/[^a-zA-Z谩茅铆贸煤脕脡脥脫脷帽脩\s]/g, '')"> 
                        <span class="edit-icon" onclick="editarCampo('apellidom')">鉁忥笍</span>
                    </div>
                </div>

                <div class="form-row">
                    <label for="correo">Correo electr贸nico:</label>
                    <div class="input-wrapper">
                        <input type="email" id="correo" name="email" 
                               value="" 
                               required maxlength="100"
                               oninvalid="this.setCustomValidity('El correo es obligatorio')"
                               oninput="this.setCustomValidity('')">
                        <span class="edit-icon" onclick="editarCampo('correo')">鉁忥笍</span>
                    </div>
                </div>

                <div class="form-row">
                    <label for="telefono">Tel茅fono:</label>
                    <div class="input-wrapper">
                        <input type="tel" id="telefono" name="telefono" 
                               value="" 
                               required maxlength="10" 
                               pattern="[0-9]{10}" 
                               title="10 d铆gitos num茅ricos"
                               oninvalid="this.setCustomValidity('El telefono es obligatorio')"
                               oninput="this.setCustomValidity(''); this.value = this.value.replace(/[^0-9]/g, '')">
                        <span class="edit-icon" onclick="editarCampo('telefono')">鉁忥笍</span>
                    </div>
                </div>

                <div class="form-row">
                    <label>Rol del Usuario:</label>
                    <div class="input-wrapper">
                        <input type="text" id="rolInput" value="Cargando..." readonly class="input-readonly" style="background-color: #e9ecef; cursor: not-allowed;">
                        <i class="fas fa-lock icon-locked" style="color: #6c757d;"></i>
                    </div>
                </div>

                <div class="form-row" style="border-bottom: none;">
                    <label for="password">Contrase帽a (Opcional):</label>
                    <div class="input-wrapper" style="position: relative;">
                        <input type="password" id="password" name="password" 
                               pattern="(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}" 
                               title="M铆nimo 8 caracteres, al menos 1 may煤scula y 1 car谩cter especial."
                               placeholder="Deja vac铆o para no cambiar"
                               maxlength="20"
                               style="padding-right: 40px;">
                        <i class="fas fa-eye-slash" 
                           id="togglePassword" 
                           style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #555;"></i>
                    </div>
                </div>
                
                <div class="btn-container">
                    <button type="submit" class="btn-guardar">Guardar Cambios</button>
                </div>
                
            </form>
        </div>

    </div>
    <!-- Footer -->
    <div id="footer-dinamico"></div>
    <script src="../js/footer.js"></script>
    <script src="../js/perfil.js"></script>
    <script src="../js/editarPerfil.js"></script>
    <script src="../js/headers.js"></script>
</body>
</html>
