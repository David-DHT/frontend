<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/contactos.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
  </head>
  <body>
    <div id="header-dinamico"></div>
    <main>
      <div class="welcome-banner">
        <img
          src="../uploads/Bienvenido.png"
          alt="Bienvenido a UNICAFE"
          class="welcome-image"
        />
      </div>
      <div class="contact-wrapper">
        <h1>Contactanos</h1>
        <p class="contact-subtitle">
          Si tienes alguna pregunta o pedido, puedes contactarnos así:
        </p>

        <a
          href="https://wa.me/527711443955"
          class="whatsapp-link"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="../uploads/WhatsApp.png" alt="Icono de WhatsApp" />
          <span class="phone-number">+52 7711443955</span>
        </a>

        <p class="contact-cta">
          Envíanos mensaje de WhatsApp para una mejor atención.
        </p>

        <p class="contact-info">También puedes ir a la cafetería.</p>
      </div>
    </main>
     
    <div id="footer-dinamico"></div>
    
    <script src="../js/footer.js"></script>
    <script src="../js/headers.js"></script>
  </body>
</html>
