<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Agregar Categor챠a - UNICAFE</title>
    <link rel="stylesheet" href="../css/agregarCategoria.css" />
  </head>
  <body>
    <div id="header-dinamico"></div>
    <main>
      <h1 class="page-title" id="mainTitle">Agregar Categor챠a</h1>

      <div class="form-container-admin">
        <form id="formCategoria">
          <input type="hidden" id="id_categoria" name="id_categoria" value="" />

          <div class="form-group-admin">
            <label for="nombre_categoria">Nombre:</label>
            <input
              type="text"
              id="nombre_categoria"
              name="nombre_categoria"
              value=""
              required
              maxlength="40"
              pattern="[A-Za-z횁횋횒횙횣찼챕챠처첬횗챰 ]+"
              title="Solo se permiten letras"
              placeholder="Ej. Bebidas Calientes"
              oninput="
                this.setCustomValidity('');
                soloLetras(event);
              "
              oninvalid="
                this.setCustomValidity('El campo Nombre es obligatorio.')
              "
            />
          </div>

          <div class="form-group-admin">
            <label for="descripcion">Descripci처n:</label>
            <input
              type="text"
              id="descripcion"
              name="descripcion"
              value=""
              required
              maxlength="100"
              pattern="[A-Za-z횁횋횒횙횣찼챕챠처첬횗챰 ]+"
              placeholder="Breve descripci처n de la categor챠a"
              oninput="
                this.setCustomValidity('');
                soloLetras(event);
              "
              oninvalid="
                this.setCustomValidity('El campo Descripci처n es obligatorio.')
              "
            />
          </div>

          <div class="button-group-admin">
            <a
              href="gestionCategorias.html"
              class="btn btn-cancel"
              id="btnCancelar"
              >Cancelar</a
            >
            <button type="submit" class="btn btn-save">Guardar</button>
          </div>
        </form>
      </div>
    </main>

    <footer
      style="
        background-color: #f1f1f1;
        padding: 10px;
        text-align: center;
        margin-top: auto;
      "
    >
      <small>Mi Sistema - Footer</small>
    </footer>

    <script src="../js/agregarCategoria.js"></script>
    <script src="../js/headers.js"></script>
  </body>
</html>
