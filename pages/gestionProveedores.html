<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Proveedores</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <link rel="stylesheet" href="../css/gestionProveedores.css" />
</head>

<body>
  <header class="p-3 bg-dark text-white text-center">
    <h4>Prueba de Gestión de Proveedores</h4>
  </header>

  <main class="inventory-content">
    <div class="back-container">
      <a href="principalAdmin.html" class="btn-regresar-unicafe">
        <i class="bi bi-arrow-left"></i> Regresar
      </a>
    </div>

    <div class="header-text">
      <h2>Gestión de Proveedores</h2>
      <p>Administra la información de los proveedores registrados.</p>
    </div>

    <div class="toolbar-container">
      <div class="search-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar proveedor..." />
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0">Gestión de Proveedores</h2>
      <button class="btn btn-success" id="btnAbrirModalProveedor">
        <i class="bi bi-plus-circle"></i> Nuevo proveedor
      </button>
    </div>

    <section class="inventory-table-container">
      <table class="styled-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Apellido paterno</th>
            <th>Apellido materno</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Estatus</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaResultados">
          <tr>
            <td colspan="7" class="text-center p-4">Cargando proveedores...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer class="p-3 bg-light text-center mt-auto">DESARROLLOOO</footer>

  <!--Para agregar-->
  <div class="modal fade" id="modalAgregarProveedor" tabindex="-1" aria-labelledby="modalAgregarProveedorLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="formAgregarProveedor">
        <div class="modal-header">
          <h5 class="modal-title" id="modalAgregarProveedorLabel">Agregar proveedor</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body">
          <div id="mensajeModalProveedor"></div>

          <div class="mb-3">
            <label for="nombreProveedor" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombreProveedor" required>
          </div>

          <div class="mb-3">
            <label for="nombreProveedor" class="form-label">Apellido Paterno</label>
            <input type="text" class="form-control" id="aPaternoProveedor" required>
          </div>

          <div class="mb-3">
            <label for="nombreProveedor" class="form-label">Apellido Materno</label>
            <input type="text" class="form-control" id="aMaternoProveedor" required>
          </div>

          <div class="mb-3">
            <label for="telefonoProveedor" class="form-label">Teléfono</label>
            <input type="text" class="form-control" id="telefonoProveedor">
          </div>

          <div class="mb-3">
            <label for="correoProveedor" class="form-label">Correo</label>
            <input type="email" class="form-control" id="correoProveedor">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar proveedor</button>
        </div>
      </form>
    </div>
  </div>
</div>

  <!--Para Actualizar-->
  <div class="modal fade" id="modalEditarProveedor" tabindex="-1" aria-labelledby="modalEditarProveedorLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="formEditarProveedor">
          <div class="modal-header">
            <h5 class="modal-title" id="modalEditarProveedorLabel">
              Editar proveedor
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editIdProveedor" />

            <div class="row g-3">
              <div class="col-md-4">
                <label for="editNombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="editNombre" required />
              </div>

              <div class="col-md-4">
                <label for="editAPaterno" class="form-label">Apellido paterno</label>
                <input type="text" class="form-control" id="editAPaterno" required />
              </div>

              <div class="col-md-4">
                <label for="editAMaterno" class="form-label">Apellido materno</label>
                <input type="text" class="form-control" id="editAMaterno" required />
              </div>

              <div class="col-md-6">
                <label for="editTelefono" class="form-label">Teléfono</label>
                <input type="text" class="form-control" id="editTelefono" required />
              </div>

              <div class="col-md-6">
                <label for="editCorreo" class="form-label">Correo</label>
                <input type="email" class="form-control" id="editCorreo" required />
              </div>
            </div>

            <div id="mensajeModalProveedor" class="mt-3"></div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>
            <button type="submit" class="btn btn-guardar">
              Guardar cambios
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/gestionProveedores.js" defer></script>
</body>

</html>
